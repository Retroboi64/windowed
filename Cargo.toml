[package]
name = "windowed"
version = "0.1.0"
edition = "2024"
description = "A minimal cross-platform windowing library for Windows and Linux (X11)"
license = "MIT"
authors = ["Patrick Reese (Retroboi64) <https://github.com/Retroboi64>"]
copyright = "Copyright (c) 2025 Patrick Reese (Retroboi64)"


keywords = ["window", "windowing", "x11", "win32", "cross-platform"]

[dependencies]
raw-window-handle = "0.6"

[target.'cfg(target_os = "linux")'.dependencies]
x11rb = { version = "0.13", features = ["allow-unsafe-code"] }

[target.'cfg(target_os = "windows")'.dependencies]
winapi = { version = "0.3", features = [
    "winuser",
    "libloaderapi",
    "wingdi",
    "windef",
    "minwindef",
    "errhandlingapi",
] }

[[example]]
name = "simple"
path = "examples/simple.rs"
